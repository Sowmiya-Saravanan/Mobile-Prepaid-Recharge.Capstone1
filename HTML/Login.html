<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MobiComm</title>
    <!-- Tailwind CSS CDN for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #4a90e2, #9013fe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }
        .login-container:hover {
            transform: translateY(-5px);
        }
        .input-field:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.5);
        }
        .error-message {
            display: none;
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        .show-error {
            display: block;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a90e2;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Admin Login</h2>
        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" required
                       class="input-field w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none"
                       placeholder="Enter your username">
                <div id="usernameError" class="error-message">Username is required</div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" required
                       class="input-field w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none"
                       placeholder="Enter your password">
                <div id="passwordError" class="error-message">Password is required</div>
            </div>
            <button type="submit" id="loginButton" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition duration-200 flex items-center justify-center">
                Login
                <span id="loadingSpinner" class="loading-spinner"></span>
            </button>
        </form>
        <p id="loginError" class="error-message text-center mt-4"></p>
        <p class="text-center text-sm text-gray-600 mt-4">
            <a href="#" class="text-blue-500 hover:underline">Forgot Password?</a>
        </p>
    </div>

    <script>
        const BASE_URL = "http://localhost:8082/api";
        const loginForm = document.getElementById("loginForm");
        const loginButton = document.getElementById("loginButton");
        const loadingSpinner = document.getElementById("loadingSpinner");
        const loginError = document.getElementById("loginError");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            // Reset error messages
            document.getElementById("usernameError").classList.remove("show-error");
            document.getElementById("passwordError").classList.remove("show-error");
            loginError.textContent = "";
            loginError.classList.remove("show-error");

            // Validation
            let isValid = true;
            if (!username) {
                document.getElementById("usernameError").classList.add("show-error");
                isValid = false;
            }
            if (!password) {
                document.getElementById("passwordError").classList.add("show-error");
                isValid = false;
            }

            if (!isValid) return;

            // Show loading spinner
            loginButton.disabled = true;
            loadingSpinner.style.display = "inline-block";

            try {
                const response = await fetch(`${BASE_URL}/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Login failed");
                }

                const data = await response.json();
                const token = data.token; // Assuming the backend returns { token: "your-jwt-token" }

                // Store token in localStorage
                localStorage.setItem("adminToken", token);

                // Redirect to admin panel
                window.location.href = "admin.html";
            } catch (error) {
                loginError.textContent = error.message;
                loginError.classList.add("show-error");
            } finally {
                loginButton.disabled = false;
                loadingSpinner.style.display = "none";
            }
        });
    </script>
</body>
</html>
